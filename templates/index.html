<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Herencia - Uma Musume</title>
    <style>
        /* Estilos básicos para que parezca una herramienta profesional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            color: #2c3e50;
            text-align: center;
        }
        .contenedor {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
        select, input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            grid-column: span 2;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2ecc71;
        }
        #resultados {
            margin-top: 30px;
            padding: 20px;
            background-color: #ecf0f1;
            border-radius: 5px;
            border-left: 5px solid #3498db;
            display: none; /* Oculto hasta que haya resultados */
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h1>Calculadora de Herencia Óptima</h1>
    
    <div class="contenedor">
        <form id="formulario-herencia">
            <div class="form-grid">
                
                <div class="form-group" style="grid-column: span 2;">
                    <label for="uma_id">Selecciona tu Umamusume:</label>
                    <select id="uma_id" name="uma_id" required>
                        <option value="">Cargando Umamusumes...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="racetrack">Pista / Hipódromo:</label>
                    <select id="racetrack" required>
                        <option value="">Cargando pistas...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="terrain">Superficie (Terreno):</label>
                    <select id="terrain" required>
                        <option value="">Cargando terrenos...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="direction">Dirección:</label>
                    <select id="direction" required>
                        <option value="">Cargando direcciones...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="length_type">Tipo de Distancia:</label>
                    <select id="length_type" required>
                        <option value="">Cargando tipos...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="length">Distancia (metros):</label>
                    <select id="length" required>
                        <option value="">Cargando distancias...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estrategia">Estrategia a usar:</label>
                    <select id="estrategia" required>
                        <option value="Front Runner">Front Runner (Runner / Nige)</option>
                        <option value="Pace Chaser">Pace Chaser (Leader / Senkou)</option>
                        <option value="Late Surger">Late Surger (Betweener / Sashi)</option>
                        <option value="End Closer">End Closer (Chaser / Oikomi)</option>
                    </select>
                </div>

                <button type="submit">Calcular Mejores Padres</button>
            </div>
        </form>

        <div id="resultados">
            <h2>Resultados del Análisis</h2>
            <pre id="json-resultados"></pre>
        </div>
    </div>

    <script>
    // ==========================================
        // ESTE ES EL PASO 1 (EL QUE SÍ CAMBIA)
        // ==========================================
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const respuesta = await fetch('/api/opciones_carrera');
                const datos = await respuesta.json();

                // Función auxiliar para llenar los menús <select>
                const llenarMenu = (idElemento, opciones) => {
                    const select = document.getElementById(idElemento);
                    select.innerHTML = ''; // Limpiamos el "Cargando..."
                    opciones.forEach(opcion => {
                        const opt = document.createElement('option');
                        opt.value = opcion;
                        opt.textContent = opcion;
                        select.appendChild(opt);
                    });
                };

                // NUEVO: Llenamos el menú de Umamusumes
                const selectUma = document.getElementById('uma_id');
                selectUma.innerHTML = '<option value="">-- Selecciona una Umamusume --</option>';
                
                if (datos.umas) {
                    datos.umas.sort((a, b) => a.nombre.localeCompare(b.nombre)); // Orden alfabético
                    datos.umas.forEach(uma => {
                        const opt = document.createElement('option');
                        opt.value = uma.id;
                        opt.textContent = `${uma.nombre} (ID: ${uma.id})`;
                        selectUma.appendChild(opt);
                    });
                }

                // Llenamos todos los desplegables con las listas limpias del CSV
                llenarMenu('racetrack', datos.racetracks);
                llenarMenu('terrain', datos.terrains);
                llenarMenu('direction', datos.directions);
                llenarMenu('length_type', datos.length_types);
                llenarMenu('length', datos.lengths);

            } catch (error) {
                console.error("Error al cargar las opciones:", error);
                alert("Hubo un problema al cargar los datos base.");
            }
        });

        // ==========================================
        // ESTE ES EL PASO 2 (SE QUEDA EXACTAMENTE IGUAL)
        // ==========================================
        document.getElementById('formulario-herencia').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue

            // Recopilamos la selección del usuario
            const payload = {
                uma_id: document.getElementById('uma_id').value,
                racetrack: document.getElementById('racetrack').value,
                terrain: document.getElementById('terrain').value,
                direction: document.getElementById('direction').value,
                length_type: document.getElementById('length_type').value,
                length: document.getElementById('length').value,
                estrategia: document.getElementById('estrategia').value
            };

            // Cambiamos el texto del botón temporalmente
            const boton = e.target.querySelector('button');
            const textoOriginal = boton.textContent;
            boton.textContent = "Calculando la genética perfecta...";
            boton.disabled = true;

            try {
                const respuesta = await fetch('/calcular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resultadoJson = await respuesta.json();
                
                // Mostramos la caja de resultados
                const cajaResultados = document.getElementById('resultados');
                cajaResultados.style.display = 'block';
                
                // Imprimimos el JSON bonito
                document.getElementById('json-resultados').textContent = JSON.stringify(resultadoJson, null, 4);
                
            } catch (error) {
                console.error("Error al calcular:", error);
                alert("Error al procesar el cálculo en el servidor.");
            } finally {
                // Restauramos el botón
                boton.textContent = textoOriginal;
                boton.disabled = false;
            }
        });
    </script>
</body>
</html>
