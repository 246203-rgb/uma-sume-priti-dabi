<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Herencia - Uma Musume</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; 
            color: #e0e0e0;
        }
        .contenedor {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 900px;
            margin: 40px auto;
        }
        label {
            font-weight: 600;
            color: #b0bec5;
        }
        #seccion-resultados {
            display: none; 
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 class="text-center mb-4 text-light fw-bold">Calculadora de Herencia Óptima</h1>
        
        <form id="formulario-herencia">
            <div class="row g-3">
                <div class="col-md-12">
                    <label for="uma_id" class="form-label">Selecciona tu Umamusume:</label>
                    <select id="uma_id" name="uma_id" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando Umamusumes...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="racetrack" class="form-label">Pista / Hipódromo:</label>
                    <select id="racetrack" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando pistas...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="terrain" class="form-label">Superficie (Terreno):</label>
                    <select id="terrain" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando terrenos...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="direction" class="form-label">Dirección:</label>
                    <select id="direction" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando direcciones...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="length_type" class="form-label">Tipo de Distancia:</label>
                    <select id="length_type" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando tipos...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="length" class="form-label">Distancia (metros):</label>
                    <select id="length" class="form-select bg-dark text-light border-secondary" required>
                        <option value="">Cargando distancias...</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label for="estrategia" class="form-label">Estrategia a usar:</label>
                    <select id="estrategia" class="form-select bg-dark text-light border-secondary" required>
                        <option value="Front Runner">Front Runner (Runner / Nige)</option>
                        <option value="Pace Chaser">Pace Chaser (Leader / Senkou)</option>
                        <option value="Late Surger">Late Surger (Betweener / Sashi)</option>
                        <option value="End Closer">End Closer (Chaser / Oikomi)</option>
                    </select>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary w-100 py-3 fs-5 fw-bold">Calcular Mejores Padres</button>
                </div>
            </div>
        </form>

        <div id="seccion-resultados" class="mt-5 pt-4 border-top border-secondary">
            <h2 class="mb-4 text-center text-info">Resultados del Análisis</h2>
            <div id="contenedor-tarjetas" class="mb-5"></div>
            
            <h3 class="mt-5 text-center text-info">Visualización del Grafo (Red Descentralizada)</h3>
            <div id="red-grafos" style="width: 100%; height: 600px; background-color: #121212; border: 1px solid #444; border-radius: 10px;" class="mb-5"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const respuesta = await fetch('/api/opciones_carrera');
                const datos = await respuesta.json();

                const llenarMenu = (idElemento, opciones) => {
                    const select = document.getElementById(idElemento);
                    select.innerHTML = ''; 
                    opciones.forEach(opcion => {
                        const opt = document.createElement('option');
                        opt.value = opcion;
                        opt.textContent = opcion;
                        select.appendChild(opt);
                    });
                };

                const selectUma = document.getElementById('uma_id');
                selectUma.innerHTML = '<option value="">-- Selecciona una Umamusume --</option>';
                
                if (datos.umas) {
                    datos.umas.sort((a, b) => a.nombre.localeCompare(b.nombre));
                    datos.umas.forEach(uma => {
                        const opt = document.createElement('option');
                        opt.value = uma.id;
                        opt.textContent = `${uma.nombre} (ID: ${uma.id})`;
                        selectUma.appendChild(opt);
                    });
                }

                llenarMenu('racetrack', datos.racetracks);
                llenarMenu('terrain', datos.terrains);
                llenarMenu('direction', datos.directions);
                llenarMenu('length_type', datos.length_types);
                llenarMenu('length', datos.lengths);
            } catch (error) {
                console.error("Error al cargar opciones:", error);
            }
        });

        document.getElementById('formulario-herencia').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const payload = {
                uma_id: document.getElementById('uma_id').value,
                racetrack: document.getElementById('racetrack').value,
                terrain: document.getElementById('terrain').value,
                direction: document.getElementById('direction').value,
                length_type: document.getElementById('length_type').value,
                length: document.getElementById('length').value,
                estrategia: document.getElementById('estrategia').value
            };

            const boton = e.target.querySelector('button');
            const textoOriginal = boton.textContent;
            boton.textContent = "Procesando matriz de afinidad...";
            boton.disabled = true;

            try {
                const respuesta = await fetch('/calcular', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resultadoJson = await respuesta.json();
                
                const seccionResultados = document.getElementById('seccion-resultados');
                const contenedorTarjetas = document.getElementById('contenedor-tarjetas');
                
                seccionResultados.style.display = 'block';
                contenedorTarjetas.innerHTML = ''; 
                
                if (resultadoJson.resultados && resultadoJson.resultados.length > 0) {
                    
                    // A) GENERAR LAS TARJETAS HTML
                    resultadoJson.resultados.slice(0, 10).forEach(padre => {
                        let etiquetasHTML = '';
                        if (padre.rasgos) {
                            for (const [id_rasgo, estrellas] of Object.entries(padre.rasgos)) {
                                const nombreRasgo = resultadoJson.factores_maestro ? resultadoJson.factores_maestro[id_rasgo] : `Rasgo ${id_rasgo}`;
                                let colorFondo = 'bg-secondary';
                                const idNumerico = parseInt(id_rasgo);
                                if (idNumerico >= 10 && idNumerico <= 50) colorFondo = 'bg-primary'; 
                                else if (idNumerico >= 110) colorFondo = 'bg-danger'; 

                                const textoEstrellas = '★'.repeat(estrellas);
                                etiquetasHTML += `<span class="badge ${colorFondo} text-light me-1 px-2 py-1 mb-1">${nombreRasgo} ${textoEstrellas}</span>`;
                            }
                        }

                        const tarjetaHTML = `
                        <div class="card bg-secondary text-light mb-3" style="border-radius: 10px; border: 1px solid #444;">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center border-bottom border-dark pb-2 mb-3">
                                    <h5 class="card-title mb-0"><strong>Uma ID: ${padre.id}</strong></h5>
                                    <span class="text-info fs-5"><strong>Puntaje: ${Math.round(padre.puntaje)}</strong></span>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="d-flex flex-wrap gap-1">
                                            ${etiquetasHTML || '<span class="text-muted">Sin datos</span>'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                        contenedorTarjetas.innerHTML += tarjetaHTML;
                    });

                    // B) GENERAR EL GRAFO TIPO RED MATEMÁTICA
                    const nodosArray = [];
                    const aristasArray = [];
                    const rasgosAgregados = new Set(); // Evitar duplicar nodos centrales
                    
                    const topPadres = resultadoJson.resultados.slice(0, 10); 

                    topPadres.forEach((padre) => {
                        const idNodoPadre = `padre_${padre.id}`;
                        
                        // Añadir nodo estilo teórico (círculo azul clásico)
                        nodosArray.push({ 
                            id: idNodoPadre, 
                            label: `Uma:\n${padre.id}`, 
                            shape: 'dot',
                            size: 15,
                            color: { background: '#4d94ff', border: '#1a66ff' },
                            font: { color: '#e0e0e0', size: 12 }
                        });

                        if (padre.rasgos && resultadoJson.prioridades_calculadas) {
                            for (const [id_rasgo, estrellas] of Object.entries(padre.rasgos)) {
                                if (resultadoJson.prioridades_calculadas[id_rasgo]) {
                                    
                                    const nombreRasgo = resultadoJson.factores_maestro[id_rasgo] || id_rasgo;
                                    const idNodoRasgo = `rasgo_${id_rasgo}`;

                                    // Si el rasgo no existe en el grafo, lo creamos como nodo conector
                                    if (!rasgosAgregados.has(idNodoRasgo)) {
                                        nodosArray.push({
                                            id: idNodoRasgo,
                                            label: nombreRasgo,
                                            shape: 'dot',
                                            size: 20,
                                            color: { background: '#ff4d94', border: '#ff1a75' },
                                            font: { color: '#ffb3d1', size: 14, bold: true }
                                        });
                                        rasgosAgregados.add(idNodoRasgo);
                                    }

                                    // Trazar conexión simple con el peso numérico
                                    const pesoRequerido = resultadoJson.prioridades_calculadas[id_rasgo];
                                    const subtotal = estrellas * pesoRequerido;

                                    aristasArray.push({
                                        from: idNodoPadre,
                                        to: idNodoRasgo,
                                        label: `${subtotal}`, // Solo el número limpio
                                        value: subtotal, // Modifica el grosor
                                        font: { align: 'horizontal', color: '#b0bec5', size: 12, strokeWidth: 0 },
                                        color: { color: '#666666', opacity: 0.7 } // Líneas grises clásicas
                                    });
                                }
                            }
                        }
                    });

                    const contenedorGrafo = document.getElementById('red-grafos');
                    const datosGrafo = { nodes: new vis.DataSet(nodosArray), edges: new vis.DataSet(aristasArray) };
                    
                    const opcionesGrafo = {
                        physics: {
                            enabled: true,
                            solver: 'forceAtlas2Based', // Físicas optimizadas para redes interconectadas
                            forceAtlas2Based: {
                                gravitationalConstant: -50,
                                centralGravity: 0.01,
                                springLength: 150
                            }
                        },
                        edges: { 
                            smooth: false // Aristas rectas y rígidas
                        }
                    };
                    new vis.Network(contenedorGrafo, datosGrafo, opcionesGrafo);

                } else {
                    contenedorTarjetas.innerHTML = '<div class="alert alert-warning bg-dark border-warning text-warning">No se encontraron padres compatibles.</div>';
                }
            } catch (error) {
                console.error("Error al calcular:", error);
                alert("Error al procesar el cálculo. Revisa la consola.");
            } finally {
                boton.textContent = textoOriginal;
                boton.disabled = false;
            }
        });
    </script>
</body>
</html>
